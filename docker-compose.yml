version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: freshmart-postgres
    environment:
      POSTGRES_DB: freshmart
      POSTGRES_USER: freshmart
      POSTGRES_PASSWORD: freshmart
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshmart -d freshmart"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - freshmart-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: freshmart-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/freshmart
      SPRING_DATASOURCE_USERNAME: freshmart
      SPRING_DATASOURCE_PASSWORD: freshmart
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - freshmart-network

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: freshmart-adminer
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - freshmart-network

volumes:
  postgres_data:

networks:
  freshmart-network:
    driver: bridge
